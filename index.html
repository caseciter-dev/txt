<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            border-bottom: 2px solid #000000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            font-weight: normal;
        }
        .layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 40px;
        }
        @media (max-width: 600px) {
            .layout { grid-template-columns: 1fr; gap: 20px; }
        }
        .sidebar h3 {
            margin-top: 0;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .date-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .date-item {
            margin-bottom: 8px;
        }
        .date-item a {
            color: #000000;
            text-decoration: none;
            border-bottom: 1px string #ccc;
        }
        .date-item a:hover, .date-item a.active {
            font-weight: bold;
            border-bottom: 1px solid #000000;
        }
        .content {
            font-size: 1.05rem;
        }
        .content h1, .content h2 { font-weight: normal; margin-top: 0; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Document Archive</h1>
    </header>
    
    <div class="layout">
        <aside class="sidebar">
            <h3>Available Dates</h3>
            <ul id="date-list" class="date-list">
                </ul>
        </aside>
        
        <main class="content" id="viewer">
            <p>Select a date from the sidebar to view the document text.</p>
        </main>
    </div>
</div>

<script>
    const dateListEl = document.getElementById('date-list');
    const viewerEl = document.getElementById('viewer');

    async function init() {
        try {
            const response = await fetch('file_list.json');
            const dates = await response.json();
            
            if (dates.length === 0) {
                viewerEl.innerHTML = "<p>No documents logs archived yet.</p>";
                return;
            }

            // Populate Sidebar
            dates.forEach((date, index) => {
                const li = document.createElement('li');
                li.className = 'date-item';
                const a = document.createElement('a');
                a.href = `#${date}`;
                a.textContent = date;
                a.onclick = (e) => {
                    document.querySelectorAll('.date-item a').forEach(el => el.classList.remove('active'));
                    a.classList.add('active');
                    loadDoc(date);
                };
                li.appendChild(a);
                dateListEl.appendChild(li);

                // Auto-load the newest document on fresh start
                if (index === 0) {
                    a.classList.add('active');
                    loadDoc(date);
                }
            });
        } catch (err) {
            viewerEl.innerHTML = "<p>Error loading document index directory.</p>";
        }
    }

    async function loadDoc(date) {
        viewerEl.innerHTML = "<p>Loading document text...</p>";
        try {
            const res = await fetch(`archive/${date}.md`);
            if (!res.ok) throw new Error();
            const mdText = await res.text();
            viewerEl.innerHTML = marked.parse(mdText);
        } catch (e) {
            viewerEl.innerHTML = `<p>Error retrieving document text for ${date}.</p>`;
        }
    }

    init();
</script>
</body>
</html>
