<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            font-family: Georgia, serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            border-bottom: 2px solid #000000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            font-weight: normal;
        }
        .layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 40px;
        }
        @media (max-width: 600px) {
            .layout { grid-template-columns: 1fr; gap: 20px; }
        }
        .sidebar h3 {
            margin-top: 0;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 5px;
        }
        .date-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .date-item {
            margin-bottom: 10px;
        }
        .date-item a {
            color: #000000;
            text-decoration: none;
            display: inline-block;
            padding: 2px 0;
        }
        .date-item a:hover, .date-item a.active {
            font-weight: bold;
            border-bottom: 2px solid #000000;
        }
        .content {
            font-size: 1.05rem;
        }
        .content h1, .content h2, .content h3 { font-weight: normal; margin-top: 0; }
        .error-box {
            border: 1px dashed #000000;
            padding: 15px;
            background: #fafafa;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Document Archive</h1>
    </header>
    
    <div class="layout">
        <aside class="sidebar">
            <h3>Archived Logs</h3>
            <ul id="date-list" class="date-list">
                <li>Loading listing...</li>
            </ul>
        </aside>
        
        <main class="content" id="viewer">
            <p>Awaiting initialization...</p>
        </main>
    </div>
</div>

<script>
    const dateListEl = document.getElementById('date-list');
    const viewerEl = document.getElementById('viewer');

    // Safe Markdown Renderer Fallback
    function renderMarkdown(rawText) {
        try {
            if (typeof marked !== 'undefined' && marked.parse) {
                return marked.parse(rawText);
            } else if (typeof marked === 'function') {
                return marked(rawText);
            }
            // Absolute plain-text fallback if CDN fails to load entirely
            return `<pre style="white-space: pre-wrap; font-family: inherit;">${rawText}</pre>`;
        } catch(e) {
            return `<pre style="white-space: pre-wrap;">${rawText}</pre>`;
        }
    }

    async function init() {
        try {
            const response = await fetch('file_list.json', { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP status ${response.status}`);
            
            const dates = await response.json();
            
            if (!dates || dates.length === 0) {
                dateListEl.innerHTML = "<li>None found</li>";
                viewerEl.innerHTML = `
                    <div class="error-box">
                        <strong>Registry Index Empty</strong>
                        <p>The file <code>file_list.json</code> was retrieved successfully, but it does not contain any file references yet. Make sure your GitHub Action has run fully at least once.</p>
                    </div>`;
                return;
            }

            dateListEl.innerHTML = ""; 
            dates.forEach((date, index) => {
                const li = document.createElement('li');
                li.className = 'date-item';
                const a = document.createElement('a');
                a.href = `#${date}`;
                a.textContent = date;
                a.onclick = (e) => {
