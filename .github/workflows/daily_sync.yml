name: Daily PDF to Markdown Converter

on:
  schedule:
    - cron: '30 15 * * *' # 15:30 UTC = 21:00 IST
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  run-parser:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run converter script
      run: python convert_pdf.py

    - name: Update Index Registry
      run: |
        # Generates a JSON array of files in the archive folder for the frontend to fetch
        echo "[" > file_list.json
        if [ -d "archive" ]; then
          ls archive/*.md | sort -r | sed 's/archive\///' | sed 's/\.md//' | awk '{print "\""$0"\""}' | paste -sd, - >> file_list.json
        fi
        echo "]" >> file_list.json

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add archive/*.md file_list.json
        git diff-index --quiet HEAD || git commit -m "Automated update: $(date +'%Y-%m-%d')"
        git push
